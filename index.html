    <script>
      (function() {
        var path = window.location.pathname;
        var manifest = "/manifest.json"; // Default
        var title = "Weep";

        if (path.startsWith("/admin")) {
          manifest = "/manifest-admin.json";
          title = "Weep Admin";
        } else if (path.startsWith("/locales")) {
          manifest = "/manifest-locales.json";
          title = "Weep Locales";
        } else if (path.startsWith("/pedir")) {
          manifest = "/manifest-pedir.json";
          title = "Weep";
        } else if (path.startsWith("/repartidores")) {
          manifest = "/manifest.json";
          title = "Weep Repartidores";
        }

        // Inyectar manifest
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifest;
        document.head.appendChild(link);

        // Actualizar título de app para iOS
        var metaTitle = document.createElement('meta');
        metaTitle.name = 'apple-mobile-web-app-title';
        metaTitle.content = title;
        document.head.appendChild(metaTitle);
      })();
    </script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        console.log("🔔 OneSignal: Initializing...");
        
        try {
          await OneSignal.init({
            appId: "a97550a5-7c54-4c92-a672-e5781f25d22c",
            safari_web_id: "web.onesignal.auto.1cd53ad7-1124-4d48-8712-0a155e6245f9",
            allowLocalhostAsSecureOrigin: true,
            serviceWorkerParam: { scope: "/" },
            serviceWorkerPath: "OneSignalSDKWorker.js",
            notifyButton: {
              enable: false, // Ocultamos el botón nativo para usar nuestro banner personalizado
            }
          });
          console.log("🔔 OneSignal: Success!");
        } catch (e) {
          console.error("🔔 OneSignal Init Error:", e);
          const errorStr = e.toString();
          if (errorStr.includes("Can only be used on:")) {
            console.warn("⚠️ Error de dominio detectado. Limpiando...");
            if (window.indexedDB) {
              const req = window.indexedDB.deleteDatabase("OneSignalSDK");
              req.onsuccess = () => console.log("✅ Caché de OneSignal eliminada.");
            }
          }
        }
      });
    </script>
