    <script type="text/javascript">
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === 'p') {
          var p = l.search.slice(3).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          });
          var q = p[1] ? '?' + p[1] : '';
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + p[0] + q + l.hash
          );
        }
      }(window.location));
    </script>
