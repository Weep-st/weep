    <title>Weep - Plataforma de Pedidos y Delivery</title>
    <meta name="description" content="La forma más fácil y rápida de pedir comida en Santo Tomé. Pedí, te lo llevamos." />
    <meta name="theme-color" content="#c62828" />

    <link rel="icon" type="image/png" sizes="32x32" href="https://i.postimg.cc/FKJD6LHQ/buscamos-repartidores-(10).png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/FKJD6LHQ/buscamos-repartidores-(10).png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/FKJD6LHQ/buscamos-repartidores-(10).png" />
    <script>
      (function() {
        var l = window.location;
        var path = l.pathname;
        var search = l.search;
        
        // Soporte para redirección SPA (GitHub Pages hack)
        if (search && search.indexOf('p=/') !== -1) {
          path = search.split('p=')[1].split('&')[0].replace(/~and~/g, '&');
        }

        var config = { name: "Weep", start: "/", title: "Weep" };
        if (path.startsWith('/pedir') || path.startsWith('/mis-pedidos')) { config = { name: "Weep - Pedidos", start: "/pedir", title: "Weep - Pedidos" }; }
        else if (path.startsWith('/locales') || path.startsWith('/prueba')) { config = { name: "Weep - Locales", start: "/locales", title: "Weep - Locales" }; }
        else if (path.startsWith('/admin')) { config = { name: "Weep - Admin", start: "/admin", title: "Weep - Admin" }; }
        else if (path.startsWith('/repartidores')) { config = { name: "Weep - Repartidores", start: "/repartidores", title: "Weep - Repartidores" }; }
        
        // URL Robusta para start_url (usa el truco de ?p= para evitar recortes de Safari)
        var pwaStartUrl = l.origin + (config.start === '/' ? '/?mode=pwa' : '/?p=' + config.start + '&mode=pwa');

        var manifest = {
          "name": config.name,
          "short_name": "Weep",
          "description": "Plataforma de Pedidos y Delivery en Santo Tomé",
          "start_url": pwaStartUrl,
          "scope": "/",
          "display": "standalone",
          "background_color": "#ffffff",
          "theme_color": "#c62828",
          "icons": [
            { "src": "https://i.postimg.cc/FKJD6LHQ/buscamos-repartidores-(10).png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
            { "src": "https://i.postimg.cc/FKJD6LHQ/buscamos-repartidores-(10).png", "sizes": "512x512", "type": "image/png" }
          ]
        };

        // Crear Manifest vía Blob
        var blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        var manifestUrl = URL.createObjectURL(blob);
        
        var link = document.createElement('link');
        link.id = 'manifest-link';
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);

        // Canonical dinámico
        var absoluteStartUrl = l.origin + config.start;
        var canonical = document.createElement('link');
        canonical.id = 'canonical-link';
        canonical.rel = 'canonical';
        canonical.href = absoluteStartUrl;
        document.head.appendChild(canonical);

        // Apple Meta Tags Dinámicos
        var updateApple = function() {
          var metaTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (!metaTitle) {
            metaTitle = document.createElement('meta');
            metaTitle.name = 'apple-mobile-web-app-title';
            document.head.appendChild(metaTitle);
          }
          metaTitle.content = config.title;
        };
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', updateApple);
        } else {
          updateApple();
        }
      })();
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <script type="text/javascript">
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === 'p') {
          var p = l.search.slice(3).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          });
          var q = p[1] ? '?' + p[1].slice(2) : '';
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + p[0] + q + l.hash
          );
        }
      }(window.location));
    </script>

    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        console.log("🔔 OneSignal: Initializing...");
        
        try {
          await OneSignal.init({
            appId: "a97550a5-7c54-4c92-a672-e5781f25d22c",
            safari_web_id: "web.onesignal.auto.1cd53ad7-1124-4d48-8712-0a155e6245f9",
            allowLocalhostAsSecureOrigin: true,
            serviceWorkerParam: { scope: "/" },
            serviceWorkerPath: "OneSignalSDKWorker.js",
            notifyButton: {
              enable: false, // Ocultamos el botón nativo para usar nuestro banner personalizado
            }
          });
          console.log("🔔 OneSignal: Success!");
        } catch (e) {
          console.error("🔔 OneSignal Init Error:", e);
          const errorStr = e.toString();
          if (errorStr.includes("Can only be used on:")) {
            console.warn("⚠️ Error de dominio detectado. Limpiando...");
            if (window.indexedDB) {
              const req = window.indexedDB.deleteDatabase("OneSignalSDK");
              req.onsuccess = () => console.log("✅ Caché de OneSignal eliminada.");
            }
          }
        }
      });
    </script>
