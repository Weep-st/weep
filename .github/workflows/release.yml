name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Package build artifacts
        run: |
          cd dist
          zip -r ../weep-web-${{ github.ref_name }}.zip .
          cd ..
          tar -czf weep-web-${{ github.ref_name }}.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - Weep App
          body: |
            ## Weep App ${{ github.ref_name }}

            Release automatica generada por GitHub Actions.

            ### Archivos incluidos
            - **weep-web-${{ github.ref_name }}.zip** — Build web (ZIP)
            - **weep-web-${{ github.ref_name }}.tar.gz** — Build web (TAR.GZ)

            ### Plataformas
            - Web (PWA)
            - Android (Capacitor)
            - iOS (Capacitor)
          files: |
            weep-web-${{ github.ref_name }}.zip
            weep-web-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
